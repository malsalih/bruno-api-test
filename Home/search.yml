info:
  name: search
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/search?type=doctor&keyword=د."
  params:
    - name: type
      value: doctor
      type: query
    - name: keyword
      value: د.
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
