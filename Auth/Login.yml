info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: "{{url}}/login?email=ahmed@example.com&password=password"
  params:
    - name: email
      value: ahmed@example.com
      type: query
    - name: password
      value: password
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
